# Project-wide Gradle properties

# Enable AndroidX
android.useAndroidX=true
# Use AndroidX artifacts when available (optional, for older libs)
android.enableJetifier=true

# Increase Gradle daemon memory so builds don't fail
# You can tweak Xmx (heap) and MaxMetaspaceSize if needed.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
